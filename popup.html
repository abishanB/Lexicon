<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>LexiconAI</title>
    <style>
      body {
        width: 280px;
        margin: 0;
        padding: 16px;
        font-family: Arial, sans-serif;
        background: #111827;
        color: #f9fafb;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 18px;
      }

      p {
        margin: 0 0 12px;
        color: #cbd5e1;
        font-size: 13px;
        line-height: 1.4;
      }

      .buttons {
        display: flex;
        gap: 8px;
      }

      button {
        flex: 1;
        border: 0;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      #startBtn {
        background: #22c55e;
        color: #052e16;
      }

      #stopBtn {
        background: #ef4444;
        color: #fff;
      }

      #status {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.08);
        font-size: 13px;
        color: #e2e8f0;
      }

      .settings {
        margin-top: 14px;
        padding: 12px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.06);
      }

      .settings h2 {
        margin: 0 0 10px;
        font-size: 13px;
        color: #e2e8f0;
      }

      .setting-row + .setting-row {
        margin-top: 10px;
      }

      .setting-row label {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 6px;
        font-size: 12px;
        color: #cbd5e1;
      }

      .setting-row input[type="range"] {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <h1>LexiconAI</h1>
    <p>Capture this tab's audio and render live subtitles on the current page.</p>
    <div class="buttons">
      <button id="startBtn">Start</button>
      <button id="stopBtn">Stop</button>
    </div>
    <div class="settings">
      <h2>Subtitle Settings</h2>
      <div class="setting-row">
        <label for="captionSize">
          <span>Caption Size</span>
          <span id="captionSizeValue">24px</span>
        </label>
        <input id="captionSize" type="range" min="18" max="40" step="1" value="24" />
      </div>
      <div class="setting-row">
        <label for="captionOpacity">
          <span>Background Opacity</span>
          <span id="captionOpacityValue">84%</span>
        </label>
        <input id="captionOpacity" type="range" min="50" max="100" step="1" value="84" />
      </div>
    </div>
    <div id="status">Checking status...</div>
    <script src="popup.js"></script>
  </body>
</html>
